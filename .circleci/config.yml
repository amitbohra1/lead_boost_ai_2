version: 2.1

jobs:
  deploy:
    docker:
      - image: cimg/node:18.18

    steps:
      - checkout

      - add_ssh_keys:
          fingerprints:
            - "SHA256:mKwcyqjePxsIsylsINA6aTxk7TPRZR9hnmAvo8OjtHY"

      - run:
          name: Deploy to VPS
          command: |
            ssh -o StrictHostKeyChecking=no root@123.12.102.224 << 'EOF'
              cd /var/www/nextjs-app

              export NODE_ENV=production

              echo "Pull latest code"
              git pull origin main

              echo "Install dependencies"
              npm install

              echo "Clean old build"
              rm -rf .next

              echo "Build project"
              npm run build

              echo "Stop old app"
              pkill -9 node || true

              echo "Start new app"
              nohup npm start > output.log 2>&1 &

              echo "Check running process"
              sleep 2
              lsof -i :3000 || true
            EOF

workflows:
  deploy:
    jobs:
      - deploy:
          filters:
            branches:
              only:
                - main

                